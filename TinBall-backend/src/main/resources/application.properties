spring.application.name=TinBall-backend

# Configuración dinámica de Base de Datos
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tinball}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# Forzamos a que sepa que es MySQL para evitar el error de Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Puerto dinámico (Render lo necesita)
server.port=${PORT:8080}